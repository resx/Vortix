<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2D32"/>
      <stop offset="100%" stop-color="#111214"/>
    </linearGradient>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A5D63"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGradient)" stroke="url(#borderGradient)" stroke-width="6"/>

  <g filter="url(#neonGlow)" fill="none" stroke="#4ade80" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="150,180 260,256 150,332" />
    <line x1="280" y1="340" x2="380" y2="340" />
  </g>
</svg>
