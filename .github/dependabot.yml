version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions-monthly:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:10"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      frontend-monthly:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:20"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      rust-monthly:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
