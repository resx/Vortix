name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/reusable-node-checks.yml
    with:
      node-version: lts/*
      pnpm-version: 10.31.0
      run-build: true
