name: reusable-node-checks

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version passed to actions/setup-node
        required: false
        default: lts/*
        type: string
      pnpm-version:
        description: pnpm version passed to pnpm/action-setup
        required: false
        default: 10.31.0
        type: string
      run-build:
        description: Whether to run the web build after lint and typecheck
        required: false
        default: true
        type: boolean

jobs:
  node-checks:
    name: node-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight
        run: pnpm ci:preflight

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        if: inputs.run-build
        run: pnpm build:web

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Node checks"
            echo "- node-version: ${{ inputs.node-version }}"
            echo "- pnpm-version: ${{ inputs.pnpm-version }}"
            echo "- run-build: ${{ inputs.run-build }}"
          } >> "$GITHUB_STEP_SUMMARY"
